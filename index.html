<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プリンセスからのつうしん</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffe6f2;
            text-align: center;
            padding: 50px 20px;
        }
        /* 共通のボタンエリア（枠を固定して場所がずれないようにする） */
        .magic-button-area {
            display: inline-block;
            margin: 20px;
            min-height: 200px; /* 画像が入っても崩れないように最小高さを確保 */
            vertical-align: middle;
        }
        .jewel {
            font-size: 160px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s;
            display: inline-block;
        }
        .jewel:active, #princess_image:active {
            transform: scale(0.9);
        }
        #text {
            font-size: 24px;
            color: #d81b60;
            margin-top: 30px;
            min-height: 60px;
            line-height: 1.5;
            font-weight: bold;
        }
        /* プリンセス画像のスタイル（同じエリアで綺麗に収まるよう調整） */
        #princess_image {
            max-width: 200px; /* 💎のサイズ感に合わせるための目安（お好みで調整してください） */
            height: auto;
            cursor: pointer;
            display: none;
            animation: popIn 0.5s ease-out;
        }
    </style>
</head>
<body>

    <!-- 魔法を起こすためのエリア（同じ場所に画像が切り替わるように内包） -->
    <div class="magic-button-area">
        <div id="jewel_btn" class="jewel" onclick="startMagic()">💎</div>
        <img id="princess_image" src="princess.PNG" alt="プリンセス">
    </div>

    <!-- メッセージが表示される箱 -->
    <div id="text">ほうせきを タップしてね！</div>

    <!-- 音声プレイヤーの配置 -->
    <audio id="audio_kettei" src="決定ボタンを押す12.mp3"></audio>
    <audio id="audio_dounyu" src="導入.wav"></audio>
    <audio id="audio_ohayou" src="おはようございます.wav"></audio>
    <audio id="audio_arigatou" src="お返事ありがとう.wav"></audio>
    <audio id="audio_yuuki" src="ゆうきのくりすたる.wav"></audio>
    <audio id="audio_kirakira" src="きらきら輝く3.mp3"></audio>
    <audio id="audio_mode_on" src="オン.wav"></audio>
    <audio id="audio_tsushin" src="カーソル移動11.mp3"></audio>
    <audio id="audio_voice5" src="荷物を持っておはよう.wav"></audio>
    <audio id="audio_princess" src="プリンセス.wav"></audio>
　　<audio id="audio_monday" src="monday.wav"></audio>
<audio id="audio_tuesday" src="tuesday.wav"></audio>
<audio id="audio_wednesday" src="wednesday.wav"></audio>
<audio id="audio_thursday" src="thursday.wav"></audio>
<audio id="audio_friday" src="friday.wav"></audio>
    <script>
        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        async function playVoice(id) {
            const audio = document.getElementById(id);
            if (!audio) { console.log("見つからないID:", id); return; }
            audio.currentTime = 0;
            try {
                await audio.play();
                await new Promise(resolve => { audio.onended = resolve; });
            } catch (e) { console.log("再生失敗:", id, e); }
        }

        function sparkle() {
            const end = Date.now() + 2000;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0, y: 0.8 }, colors: ['#ffe6f2', '#d81b60', '#ffb3d9', '#ffffff'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1, y: 0.8 }, colors: ['#ffe6f2', '#d81b60', '#ffb3d9', '#ffffff'] });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }

        async function startMagic() {
            const jewelBtn = document.getElementById("jewel_btn");
            const princessImg = document.getElementById("princess_image");
            const text = document.getElementById("text");

            // 初期化：ジュエルを表示、プリンセスを非表示に
            jewelBtn.style.display = "inline-block";
            princessImg.style.display = "none";

            // スマホ対策：すべての音声を一瞬再生してストップ
            const audios = document.querySelectorAll("audio");
            for (const a of audios) {
                a.play().then(() => { a.pause(); a.currentTime = 0; }).catch(() => {});
            }

            // 連打防止（エリア全体をタップ不可にする）
            const buttonArea = document.querySelector(".magic-button-area");
            buttonArea.style.pointerEvents = "none";

            // シナリオスタート
            text.innerText = "📡通信接続中…";
            await playVoice("audio_kettei");
            await sleep(1500);
            await playVoice("audio_tsushin");

            text.innerText = "プリンセスのおしろからつうしんです。なおひめさま、きこえますか？";
            await playVoice("audio_dounyu");
            text.innerText = "……お返事まっています…";
            await sleep(2000);

            text.innerText = "なおひめさま、おはようございます！";
            await playVoice("audio_ohayou");
            text.innerText = "……お返事まっています…";
            await sleep(2000);

            text.innerText = "おへんじありがとう！今日もお声がきけてとってもうれしいです";
            await playVoice("audio_arigatou");
            await sleep(2000);

            // ★【ここを追加】「ゆうきのクリスタル」の前に画像を切り替える
            jewelBtn.style.display = "none";       // 💎を消す
            princessImg.style.display = "block";    // プリンセスを同じ場所に出す

　　　　　　　// --- 修正後：ここから置き換える ---
// 現在の曜日を取得 (0: 日曜日, 1: 月曜日, ..., 5: 金曜日, 6: 土曜日)
const dayOfWeek = new Date().getDay();

// 曜日ごとの設定（音声のIDと、画面に表示するテキスト）
let voiceId = "audio_yuuki"; // 念のため土日のデフォルト
let crystalText = "今日の魔法は…ゆうきのクリスタルです💖";

if (dayOfWeek === 1) {
  voiceId = "audio_monday";
  crystalText = "今日の魔法は…げつようびのクリスタルです🌙";
} else if (dayOfWeek === 2) {
  voiceId = "audio_tuesday";
  crystalText = "今日の魔法は…かようびのクリスタルです🔥";
} else if (dayOfWeek === 3) {
  voiceId = "audio_wednesday";
  crystalText = "今日の魔法は…すいようびのクリスタルです💧";
} else if (dayOfWeek === 4) {
  voiceId = "audio_thursday";
  crystalText = "今日の魔法は…もくようびのクリスタルです🌳";
} else if (dayOfWeek === 5) {
  voiceId = "audio_friday";
  crystalText = "今日の魔法は…きんようびのクリスタルです✨";
}

// 決定したテキストを表示して音声を再生
text.innerText = crystalText;
await playVoice(voiceId);
await sleep(2000);
// --- 修正後：ここまで ---
            

            text.innerText = "荷物を持って先生におはようが言えたら魔法成功！";
            await playVoice("audio_voice5");
            await sleep(2000);

            text.innerText = "プリンセスモード……";
            await playVoice("audio_princess");
            await sleep(1000);

            // 💎ではなく、プリンセス画像が出ている状態で「タップしてね」にする
            text.innerText = "プリンセスを タップしてね！";
            buttonArea.style.pointerEvents = "auto"; // タップ可能に戻す

            // プリンセス画像（またはエリア内）が押されるまで待つ
            await new Promise(resolve => {
                buttonArea.onclick = async () => {
                    buttonArea.style.pointerEvents = "none"; // ロック
                    await playVoice("audio_tsushin");
                    resolve();
                };
            });

            text.innerText = "オン！✨";
            await playVoice("audio_mode_on");

            const kirakira = document.getElementById("audio_kirakira");
            if (kirakira) kirakira.play();
            sparkle();

            // 終了後、もう一度遊べるようにボタンエリアを元に戻す
            buttonArea.onclick = null; // クリックイベントを一度クリア
            buttonArea.style.pointerEvents = "auto";
        }
    </script>
</body>
</html>
