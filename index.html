<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プリンセスからのつうしん</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffe6f2;
            text-align: center;
            padding: 50px 20px;
        }
        /* 共通のボタンエリア（枠を固定して場所がずれないようにする） */
        .magic-button-area {
            position: relative;        
            z-index: 10;               
            display: inline-flex;       
            flex-direction: column;     
            align-items: center;        
            justify-content: center;    
            margin: 20px auto;          
            min-height: 200px;
            vertical-align: middle;
        }
        /* 宝石ボタン専用のスタイル */
        #jewel_btn {
            font-size: 160px; 
            cursor: pointer; 
            user-select: none; 
            transition: transform 0.2s; 
            display: inline-block;
            position: relative;
            z-index: 20;               
        }
        #jewel_btn:active {
            transform: scale(0.9);
        }
        /* フェアリーとステッキに適用する共通スタイル */
        .magic-img {
            max-width: 200px; 
            height: auto;
            cursor: pointer;
            display: none;
            animation: popIn 0.5s ease-out;
            margin: 0 auto; 
            transform-origin: bottom center; /* 💡足元を基準に動かすための設定 */
        }
        .magic-img:active {
            transform: scale(0.9);
        }
        /* 最後に出てくるプリンセスだけ、個別に拡大します */
        #princess_image {
            max-width: 500px; 
            margin: 0 auto; 
            box-sizing: border-box; 
            padding-right: 130px;     
        }
        #text {
            position: relative;
            z-index: 1;                
            font-size: 24px;
            color: #d81b60;
            margin-top: 30px;
            min-height: 60px;
            line-height: 1.5;
            font-weight: bold;
        }
        /* フェアリーがゆっくりふわふわ上下に浮くエフェクト */
        @keyframes fluffy {
            0% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0); }
        }
        .fairy-bounce {
            animation: fluffy 2.5s ease-in-out infinite;
        }
        /* お顔切り替えのブレをなくす設定 */
        .face-change {
            transition: none !important;
        }

        /* 1. ドキドキズーム */
        @keyframes zoomInTalk {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); } 
            100% { transform: scale(1); }
        }
        .fairy-zoom {
            animation: fluffy 2.5s ease-in-out infinite, zoomInTalk 0.6s ease-in-out !important;
        }

        /* 2. くるくるジャンプ */
        @keyframes happyJump {
            0% { transform: translateY(0) rotate(0deg); }
            30% { transform: translateY(-40px) rotate(180deg); } 
            60% { transform: translateY(-40px) rotate(360deg); } 
            100% { transform: translateY(0) rotate(360deg); }
        }
        .fairy-jump {
            animation: happyJump 0.6s ease-out !important;
        }

        /* 3. 左右にゆらゆらダンス */
        @keyframes swayDance {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(8deg) translateX(5px); }  
            75% { transform: rotate(-8deg) translateX(-5px); } 
            100% { transform: rotate(0deg); }
        }
        .fairy-dance {
            animation: swayDance 1.2s ease-in-out infinite !important;
        }
    </style>
</head>
<body>

    <!-- 魔法を起こすためのエリア -->
    <div class="magic-button-area">
        <div id="jewel_btn" onclick="startMagic()">💎</div>
        <img id="fairy_image" class="magic-img" src="fairy_monday.png" alt="フェアリー">
        <img id="wand_image" class="magic-img" src="wand_monday.png" alt="ステッキ">
        <img id="princess_image" class="magic-img" src="normal.png" alt="プリンセス">
    </div>

    <!-- メッセージが表示される箱 -->
    <div id="text">ほうせきを タップしてね！</div>

    <!-- 音声プレイヤーの配置 -->
    <audio id="audio_kettei" src="決定ボタンを押す12.mp3"></audio>
    <audio id="audio_dounyu" src="導入.wav"></audio>
    <audio id="audio_ohayou" src="おはようございます.wav"></audio>
    <audio id="audio_arigatou" src="お返事ありがとう.wav"></audio>
    <audio id="audio_kirakira" src="きらきら輝く3.mp3"></audio>
    <audio id="audio_mode_on" src="オン.wav"></audio>
    <audio id="audio_tsushin" src="カーソル移動11.mp3"></audio>
    <audio id="audio_kaban" src="荷物を持っておはよう.wav"></audio>
    <audio id="audio_dekiruyo" src="dekiruyo.wav"></audio>
    <audio id="audio_princess" src="プリンセス.wav"></audio>
    <audio id="audio_go" src="いってらっしゃい.wav"></audio>

    <!-- 日替わりフェアリーボイス -->
    <audio id="audio_monday" src="monday.wav"></audio>
    <audio id="audio_tuesday" src="tuesday.wav"></audio>
    <audio id="audio_wednesday" src="wednesday.wav"></audio>
    <audio id="audio_thursday" src="thursday.wav"></audio>
    <audio id="audio_friday" src="friday.wav"></audio>

    <script>
        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        const jewelBtn = document.getElementById("jewel_btn");
        const fairyImg = document.getElementById("fairy_image");
        const wandImg = document.getElementById("wand_image");
        const princessImg = document.getElementById("princess_image");
        const text = document.getElementById("text");
        const buttonArea = document.querySelector(".magic-button-area");

        async function playVoice(audioId) {
            const audio = document.getElementById(audioId);
            if (!audio) { console.log("見つからないID:", audioId); return; }
            audio.currentTime = 0;
            audio.muted = false;
            audio.volume = 1.0; 
            return new Promise((resolve) => {
                audio.onended = resolve;
                audio.play().catch(e => {
                    console.log("再生失敗:", audioId, e);
                    resolve();
                });
            });
        }

        function sparkle() {
            const end = Date.now() + 2000;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0, y: 0.8 }, colors: ['#ffe6f2', '#d81b60', '#ffb3d9', '#ffffff'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1, y: 0.8 }, colors: ['#ffe6f2', '#d81b60', '#ffb3d9', '#ffffff'] });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }

        async function startMagic() {
            const allAudios = document.querySelectorAll("audio");
            for (const audio of allAudios) {
                audio.muted = true;
                audio.volume = 0;
                try {
                    await audio.play();
                    audio.pause();
                    audio.currentTime = 0;
                } catch(e) {
                    console.log("アンロック失敗:", e);
                }
            }

            // 1. 初期化と画面リセット
            jewelBtn.style.display = "none";
            fairyImg.style.display = "none";
            fairyImg.classList.remove("fairy-bounce", "fairy-zoom", "fairy-jump", "fairy-dance");
            wandImg.style.display = "none";
            princessImg.style.display = "none";
            buttonArea.style.pointerEvents = "none";

            const firstAudio = document.getElementById("audio_kettei");
            if (firstAudio) {
                firstAudio.muted = false;
                firstAudio.volume = 1.0;
                firstAudio.play().catch(e => console.log("iOS対策再生失敗:", e));
            }

            let dayOfWeek = new Date().getDay();
            if (dayOfWeek === 0 || dayOfWeek === 6) {
                dayOfWeek = 1; 
            }
            
            let voiceId = "audio_monday";
            let fairyFile = "fairy_monday.png";
            let wandFile = "wand_monday.png";
            let princessFile = "princess_monday.png";
            
            // 💡 曜日ごとの「背景色」と「クリスタルの種類」を準備します
            let bgColor = "#ffe6f2"; // 月曜：ピンク
            let crystalEmoji = "💗✨"; 

            if (dayOfWeek === 2) { // 火曜：水色
                voiceId = "audio_tuesday"; fairyFile = "fairy_tuesday.png"; wandFile = "wand_tuesday.png"; princessFile = "princess_tuesday.png";
                bgColor = "#e6f2ff"; crystalEmoji = "🩵✨";
            } else if (dayOfWeek === 3) { // 水曜：緑
                voiceId = "audio_wednesday"; fairyFile = "fairy_wednesday.png"; wandFile = "wand_wednesday.png"; princessFile = "princess_wednesday.png";
                bgColor = "#e6fff2"; crystalEmoji = "💚✨";
            } else if (dayOfWeek === 4) { // 木曜：紫
                voiceId = "audio_thursday"; fairyFile = "fairy_thursday.png"; wandFile = "wand_thursday.png"; princessFile = "princess_thursday.png";
                bgColor = "#f0e6ff"; crystalEmoji = "💜✨";
            } else if (dayOfWeek === 5) { // 金曜：黄色
                voiceId = "audio_friday"; fairyFile = "fairy_friday.png"; wandFile = "wand_friday.png"; princessFile = "princess_friday.png";
                bgColor = "#fff9e6"; crystalEmoji = "💛✨";
            }

            fairyImg.src = fairyFile;
            wandImg.src = wandFile;

            // 2. シナリオスタート
            text.innerText = "📡通信接続中…"; 
            await playVoice("audio_kettei");
            await sleep(1500);

            // 💡 通信が繋がった瞬間に、画面全体が「今日のテーマカラー」に変身！
            document.body.style.backgroundColor = bgColor;

            // 宝石の場所に大きなお城を出して、画面の文字はスッキリ消します
            jewelBtn.innerText = "🏰";
            jewelBtn.style.display = "inline-block"; 
            text.innerText = ""; 

            // 最初のダンスの準備
            fairyImg.classList.add("fairy-dance");
            await playVoice("audio_tsushin");

            // ①「プリンセスのおしろから〜」（大きなお城が出ている状態）
            await playVoice("audio_dounyu");
            await sleep(2000);

            // ②「おはようございます！」の直前で、お城を隠してフェアリーをパッと出します！
            jewelBtn.style.display = "none"; 
            jewelBtn.innerText = "💎"; // 次のために元の宝石に戻しておく
            
            fairyImg.classList.remove("fairy-dance");
            fairyImg.classList.add("fairy-zoom");
            fairyImg.style.display = "block";

            await playVoice("audio_ohayou");
            await sleep(2000);

            // ③「おへんじありがとう」
            fairyImg.classList.remove("fairy-zoom");
            fairyImg.classList.add("fairy-dance");

            await playVoice("audio_arigatou");
            await sleep(1500);

            // 💡【新演出】クリスタルをあげるよ！のタイミングで、今日のクリスタルに変身！
            fairyImg.style.display = "none";
            jewelBtn.innerText = crystalEmoji; // ⭕️ ここが曜日ごとの色（💗💎💚💜💛）になります！
            jewelBtn.style.fontSize = "180px"; 
            jewelBtn.style.display = "inline-block";

            // 曜日ごとのクリスタルボイス（画面には綺麗な色のクリスタル！）
            await playVoice(voiceId);
            
            // 💡ボイスが終わったら、フェアリーちゃんを画面に戻します
            jewelBtn.style.display = "none";
            jewelBtn.innerText = "💎"; 
            jewelBtn.style.fontSize = "160px";
            
            fairyImg.classList.add("fairy-dance");
            fairyImg.style.display = "block";

            // 続けてすぐカバンの目標ボイス
            await playVoice("audio_kaban");
            await sleep(2000);

            // ④ 最後のおうえんはズームに切り替えます
            fairyImg.classList.remove("fairy-dance");
            fairyImg.classList.add("fairy-zoom");

            await playVoice("audio_dekiruyo");
            await sleep(2000);

            // フェアリーが退場してステッキへ
            fairyImg.style.display = "none";
            fairyImg.classList.remove("fairy-zoom");
            wandImg.style.display = "block";

            await playVoice("audio_princess");
            
            // 次にすることをお知らせ
            text.innerText = `ステッキを プッシュして 
魔法を完成させてね！`;
            
            buttonArea.style.pointerEvents = "auto";

            await new Promise(resolve => {
                buttonArea.onclick = async () => {
                    buttonArea.style.pointerEvents = "none";
                    await playVoice("audio_tsushin");
                    resolve();
                };
            });

            wandImg.style.display = "none";
            princessImg.src = princessFile;
            princessImg.style.display = "block";
            await playVoice("audio_mode_on");

            const kirakira = document.getElementById("audio_kirakira");
            if (kirakira) {
                kirakira.muted = false;
                kirakira.volume = 1.0;
                kirakira.play();
            }
            sparkle(); // 紙ふぶきエフェクト
            
            await playVoice("audio_go");

            buttonArea.onclick = null;
            buttonArea.style.pointerEvents = "auto";
