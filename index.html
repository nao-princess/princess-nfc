<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プリンセスからのつうしん</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    @keyframes popIn {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #ffe6f2;
      text-align: center;
      padding: 50px 20px;
    }
    .jewel {
      font-size: 160px;
      cursor: pointer;
      display: inline-block;
      margin: 20px;
      user-select: none;
      transition: transform 0.2s;
    }
    .jewel:active {
      transform: scale(0.9);
    }
    #text {
      font-size: 24px;
      color: #d81b60;
      margin-top: 30px;
      min-height: 60px;
      line-height: 1.5;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <!-- 魔法を起こすための宝石ボタン -->
  <div class="jewel" onclick="startMagic()">💎</div>

  <!-- メッセージが表示される箱 -->
  <div id="text">ほうせきを タップしてね！</div>

  <!-- ========================================== -->
  <!-- HTML側：音声プレイヤーの配置（IDはシンプルに命名） -->
  <!-- ========================================== -->
  <audio id="audio_kettei" src="決定ボタンを押す12.mp3"></audio>
  <audio id="audio_dounyu" src="導入.wav"></audio>
  <audio id="audio_ohayou" src="おはようございます.wav"></audio>
  <audio id="audio_arigatou" src="お返事ありがとう.wav"></audio>
  <audio id="audio_yuuki" src="ゆうきのくりすたる.wav"></audio>
  <audio id="audio_kirakira" src="きらきら輝く3.mp3"></audio>
  <audio id="audio_mode_on" src="オン.wav"></audio>
  <audio id="audio_tsushin" src="カーソル移動11.mp3"></audio>
  <audio id="audio_voice5" src="荷物を持っておはよう.wav"></audio>
<audio id="audio_princess" src="プリンセス.wav"></audio>

  <!-- ★プリンセスの画像が表示される場所（背景透過素材が映える設定） -->
<img id="princess_image" src="princess.png" alt="プリンセス" style="display: none; max-width: 80%; height: auto; margin: 20px auto 0 auto; animation: popIn 0.5s ease-out;">
  <!-- ========================================== -->
  <!-- JavaScript側：ロボットへの命令・シナリオ -->
  <!-- ========================================== -->
  <script>
    // 指定したミリ秒だけ待つ命令
    function sleep(ms) {
      return new Promise(r => setTimeout(r, ms));
    }

    // 指定したIDの音声を再生し、終わるまで待つ命令
    async function playVoice(id) {
      const audio = document.getElementById(id);
      if (!audio) {
        console.log("見つからないID:", id);
        return;
      }

      audio.currentTime = 0;

      try {
        await audio.play();
        // 音声が最後まで再生されるのを待つ
        await new Promise(resolve => {
          audio.onended = resolve;
        });
      } catch (e) {
        console.log("再生失敗:", id, e);
      }
    }

    // きらきらエフェクト用の仮の関数（エラー防止用）
function sparkle() {
  // 画面いっぱいにきらきら（紙吹雪）を2秒間降らせる
  const end = Date.now() + 2000;

  (function frame() {
    confetti({
      particleCount: 5,
      angle: 60,
      spread: 55,
      origin: { x: 0, y: 0.8 },
      colors: ['#ffe6f2', '#d81b60', '#ffb3d9', '#ffffff'] // プリンセス風の色合い
    });
    confetti({
      particleCount: 5,
      angle: 120,
      spread: 55,
      origin: { x: 1, y: 0.8 },
      colors: ['#ffe6f2', '#d81b60', '#ffb3d9', '#ffffff']
    });

    if (Date.now() < end) {
      requestAnimationFrame(frame);
    }
  }());
}

    // 宝石が押されたときのメインの魔法シナリオ
    async function startMagic() {
      document.getElementById("princess_image").style.display = "none";
      // 1. 最初にあらかじめすべての音声を一瞬だけ再生して止める（スマホ対策）
      const audios = document.querySelectorAll("audio");
      for (const a of audios) {
        a.play()
          .then(() => {
            a.pause();
            a.currentTime = 0;
          })
          .catch(() => {});
      }

      const text = document.getElementById("text");

      // 二重タップ防止（連打できないようにする）
      document.querySelector(".jewel").style.pointerEvents = "none";

      // シナリオスタート
      text.innerText = "📡通信接続中…";
      await playVoice("audio_kettei");
      await sleep(1500);
      await playVoice("audio_tsushin");
    
     text.innerText = "プリンセスのおしろからつうしんです。なおひめさま、きこえますか？";
      await playVoice("audio_dounyu");

     text.innerText = "……お返事まっています…";
      await sleep(2000); // お返事を待つために2秒間あける
      
      text.innerText = "なおひめさま、おはようございます！";
      await playVoice("audio_ohayou");

      text.innerText = "……お返事まっています…";
      await sleep(2000); // お返事を待つために2秒間あける

      text.innerText = "おへんじありがとう！今日もお声がきけてとってもうれしいです";
      await playVoice("audio_arigatou");
      await sleep(2000); //

      text.innerText = "今日の魔法は…ゆうきのクリスタルです💖";
      await playVoice("audio_yuuki");
      await sleep(2000); //

      text.innerText = "荷物を持って先生におはようが言えたら魔法成功！";
      await playVoice("audio_voice5");
      await sleep(2000); //

     // 1. まず「プリンセス…」と表示
  text.innerText = "プリンセスモード……";
  await playVoice("audio_princess");
  await sleep(1000); // 1秒待つ

// 2. 画面を「💎をタップしてね！」にして、一時的にボタンをまた押せるようにする
  text.innerText = "💎をタップしてね！";
  const jewelButton = document.querySelector(".jewel");
  jewelButton.style.pointerEvents = "auto"; // タップできるように復活

  // 💎が押されるまでここでじっと待つ魔法の命令
  await new Promise(resolve => {
    jewelButton.onclick = async () => {
      // 宝石が押されたら、もう連打できないように再びロック
      jewelButton.style.pointerEvents = "none";
      
      // 効果音を鳴らす
      await playVoice("audio_tsushin");
      resolve(); // 次の処理へ進む合図
    };
  });

  // 3. 最後に「モード、オン！✨」と表示してセリフを流す
  text.innerText = "オン！✨";
  await playVoice("audio_mode_on");

      // 最後はBGMを流してエフェクトを出す
      const kirakira = document.getElementById("audio_kirakira");
      if (kirakira) kirakira.play();

      sparkle();
      document.getElementById("princess_image").style.display = "block";

      // もう一度遊べるようにボタンを元に戻す
      document.querySelector(".jewel").style.pointerEvents = "auto";
    }
  </script>
</body>
</html>
